name: trading-desk

x-defaults: &defaults
  restart: unless-stopped
  networks: [trading-desk]

# Shared OTel env block — merged into every microservice.
# Leave OTEL_EXPORTER_OTLP_ENDPOINT empty to disable tracing (default).
# Point it at any OTLP-HTTP collector (e.g. http://otel-collector:4318).
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}

# Helicone proxy env block — merged into LLM-calling services (rag, agentic).
# Leave HELICONE_API_KEY empty to call providers directly (default).
x-helicone-env: &helicone-env
  HELICONE_API_KEY: ${HELICONE_API_KEY:-}
  HELICONE_CACHE_ENABLED: ${HELICONE_CACHE_ENABLED:-true}

services:
  rag-service:
    <<: *defaults
    build: ./services/rag-service
    ports: ["8001:8001"]
    environment:
      <<: [*otel-env, *helicone-env]
      OTEL_SERVICE_NAME: rag-service
      RAG_HELICONE_API_KEY: ${HELICONE_API_KEY:-}
      RAG_HELICONE_CACHE_ENABLED: ${HELICONE_CACHE_ENABLED:-true}
      RAG_ENVIRONMENT: ${ENVIRONMENT:-dev}
      RAG_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RAG_STORE_BACKEND: chroma
      RAG_CHROMA_PATH: /srv/chroma_db
      RAG_SUMMARIZER_BACKEND: ${RAG_SUMMARIZER_BACKEND:-extractive}
      RAG_OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      RAG_OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      RAG_BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-5-haiku-20241022-v1:0}
      RAG_AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # LLM router — multi-provider fallback chain for summarizer_backend=litellm
      RAG_LLM_PROVIDER_CHAIN: ${LLM_PROVIDER_CHAIN:-groq,gemini,openai,ollama}
      RAG_GROQ_API_KEY: ${GROQ_API_KEY:-}
      RAG_GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      RAG_GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      RAG_GEMINI_MODEL: ${GEMINI_MODEL:-gemini/gemini-2.0-flash}
      RAG_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAG_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      RAG_GITHUB_API_KEY: ${GITHUB_API_KEY:-}
      RAG_GITHUB_MODEL: ${GITHUB_MODEL:-gpt-4o-mini}
    volumes:
      - chroma_data:/srv/chroma_db

  vision-analyser:
    <<: *defaults
    build: ./services/vision-analyser
    ports: ["8002:8002"]
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: vision-analyser
      VISION_ENVIRONMENT: ${ENVIRONMENT:-dev}
      VISION_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VISION_MODEL_BACKEND: ${VISION_MODEL_BACKEND:-heuristic}
      VISION_MODEL_PATH: ${VISION_MODEL_PATH:-}

  agentic-engine:
    <<: *defaults
    build: ./services/agentic-engine
    ports: ["8003:8003"]
    environment:
      <<: [*otel-env, *helicone-env]
      OTEL_SERVICE_NAME: agentic-engine
      AGENTIC_HELICONE_API_KEY: ${HELICONE_API_KEY:-}
      AGENTIC_HELICONE_CACHE_ENABLED: ${HELICONE_CACHE_ENABLED:-true}
      AGENTIC_ENVIRONMENT: ${ENVIRONMENT:-dev}
      AGENTIC_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AGENTIC_ENGINE_BACKEND: ${AGENTIC_ENGINE_BACKEND:-deterministic}
      AGENTIC_BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-sonnet-4-6}
      AGENTIC_AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # LLM router — multi-provider fallback chain
      AGENTIC_LLM_PROVIDER_CHAIN: ${LLM_PROVIDER_CHAIN:-groq,gemini,openai,ollama}
      AGENTIC_GROQ_API_KEY: ${GROQ_API_KEY:-}
      AGENTIC_GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      AGENTIC_GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AGENTIC_GEMINI_MODEL: ${GEMINI_MODEL:-gemini/gemini-2.0-flash}
      AGENTIC_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENTIC_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AGENTIC_GITHUB_API_KEY: ${GITHUB_API_KEY:-}
      AGENTIC_GITHUB_MODEL: ${GITHUB_MODEL:-gpt-4o-mini}
      AGENTIC_OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      AGENTIC_OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      # Web search
      AGENTIC_WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-true}
      AGENTIC_TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      # Conversational memory
      AGENTIC_MEMORY_BACKEND: ${MEMORY_BACKEND:-sqlite}
      AGENTIC_MEMORY_DB_PATH: /srv/data/agent_memory.db
    volumes:
      - agent_memory:/srv/data

  guardrails-service:
    <<: *defaults
    build: ./services/guardrails-service
    ports: ["8004:8004"]
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: guardrails-service
      GUARDRAILS_ENVIRONMENT: ${ENVIRONMENT:-dev}
      GUARDRAILS_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GUARDRAILS_BACKEND: ${GUARDRAILS_BACKEND:-rules}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}

  trading-dashboard:
    <<: *defaults
    build: ./frontend/trading-dashboard
    ports: ["3002:80"]
    depends_on: [guardrails-service, rag-service, vision-analyser, agentic-engine]

  admin-panel:
    <<: *defaults
    build: ./frontend/admin-panel
    ports: ["8501:8501"]
    environment:
      RAG_URL: http://rag-service:8001
      VISION_URL: http://vision-analyser:8002
      AGENTIC_URL: http://agentic-engine:8003
      GUARDRAILS_URL: http://guardrails-service:8004
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
    depends_on: [rag-service, vision-analyser]

  # ── Observability stack (opt-in) ────────────────────────────────────────────
  # Start with: docker compose --profile observability up -d
  # Jaeger all-in-one: OTLP HTTP on :4318, UI on :16686
  otel-collector:
    <<: *defaults
    image: jaegertracing/all-in-one:1.60
    profiles: [observability]
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

networks:
  trading-desk:
    driver: bridge

volumes:
  chroma_data:
  agent_memory:
