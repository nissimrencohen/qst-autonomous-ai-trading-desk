<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- QST · Quant Swarm Terminal — phosphor-amber / neo-mint terminal mark -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e141b"/>
      <stop offset="1" stop-color="#0a0e12"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="13" fill="url(#bg)" stroke="#cc7a1f" stroke-width="2"/>
  <!-- subtle scanline -->
  <rect x="2" y="2" width="60" height="60" rx="13" fill="none" stroke="#1c2630" stroke-width="1" opacity="0.6"/>
  <!-- terminal prompt chevron (amber) -->
  <path d="M16 22 L26 32 L16 42" fill="none" stroke="#ffb454" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- blinking-cursor block (neo-mint) -->
  <rect x="32" y="36" width="16" height="6" rx="1.5" fill="#2dd4a7"/>
</svg>
