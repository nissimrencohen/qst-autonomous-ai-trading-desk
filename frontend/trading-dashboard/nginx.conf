server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Primary data path: forward webhook calls to the n8n orchestrator on the
    # compose network. Resolved per-request (Docker's embedded DNS) so the
    # dashboard still starts when n8n is absent — the SPA then falls back to
    # direct-services mode on fetch failure.
    location /webhook/ {
        resolver 127.0.0.11 valid=10s;
        set $n8n_upstream http://n8n:5678;
        proxy_pass $n8n_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 180s;
        client_max_body_size 10m;
    }

    location / {
        try_files $uri /index.html;
    }
}
